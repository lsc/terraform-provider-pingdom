name: Test suite
on:
  pull_request:
    types: [opened, synchronize, reopened]
jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Mise
        uses: jdx/mise-action@v4
        with:
          install: true

      - name: Test
        run: mise task run test
